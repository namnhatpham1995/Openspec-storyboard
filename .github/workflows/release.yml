name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to build and tag, e.g. v1.2.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate version input
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "::error::Invalid version '$version' — must match v* (e.g. v1.2.3)"
            exit 1
          fi
      - name: Check tag does not already exist
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if git ls-remote --tags origin "refs/tags/$version" | grep -q "$version"; then
            echo "::error::Tag '$version' already exists on origin"
            exit 1
          fi
      - name: Create and push tag
        shell: bash
        run: |
          version="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$version"
          git push origin "$version"
      - id: resolve
        run: echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"

  build:
    needs: [prepare]
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    strategy:
      matrix:
        include:
          - target: windows/amd64
            runner: windows-latest
            artifact: storyboard-windows-amd64.exe
          - target: darwin/amd64
            runner: macos-15-intel
            artifact: storyboard-darwin-amd64
          - target: darwin/arm64
            runner: macos-14
            artifact: storyboard-darwin-arm64
          - target: linux/amd64
            runner: ubuntu-latest
            artifact: storyboard-linux-amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version || github.ref_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build and verify release binary
        shell: bash
        run: go run ./scripts/release --version "${{ needs.prepare.outputs.version || github.ref_name }}" --target "${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish:
    needs: [prepare, build]
    if: always() && (needs.prepare.result == 'success' || needs.prepare.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version || github.ref_name }}
          files: dist/*
          generate_release_notes: true
