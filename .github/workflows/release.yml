name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: windows/amd64
            runner: windows-latest
            artifact: storyboard-windows-amd64.exe
          - target: darwin/amd64
            runner: macos-15-intel
            artifact: storyboard-darwin-amd64
          - target: darwin/arm64
            runner: macos-14
            artifact: storyboard-darwin-arm64
          - target: linux/amd64
            runner: ubuntu-latest
            artifact: storyboard-linux-amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build and verify release binary
        shell: bash
        run: go run ./scripts/release --version "${GITHUB_REF_NAME}" --target "${{ matrix.target }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
